apiVersion: apps/v1
kind: Deployment
metadata:
  name: netflix-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netflix
  template:
    metadata:
      labels:
        app: netflix
    spec:
      containers:
      - name: netflix
        image: us-central1-docker.pkg.dev/saraz-proj26/test-repo/netflix:v1.24
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: netflix-service
spec:
  type: LoadBalancer
  selector:
    app: netflix
  ports:
  - port: 80
    targetPort: 4000